model = "gpt-5.4"
model_reasoning_effort = "high"

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.openclaw-agent-designer]
description = "Designs resilient OpenClaw agents and workflows with idempotent Phase 0 patterns."
config_file = "agents/openclaw-agent-designer.toml"

[agents.openclaw-agent-design-reviewer]
description = "Reviews OpenClaw agent designs for path validity, test coverage evidence, and documentation completeness."
config_file = "agents/openclaw-agent-design-reviewer.toml"

[agents.playwright-test-planner]
description = "Explores UI and produces comprehensive Playwright test plans."
config_file = "agents/playwright-test-planner.toml"

[agents.playwright-test-generator]
description = "Generates Playwright specs from approved test plans."
config_file = "agents/playwright-test-generator.toml"

[agents.playwright-test-healer]
description = "Debugs and heals failing Playwright tests with bounded fix rounds."
config_file = "agents/playwright-test-healer.toml"

[agents.wdio-to-playwright-check]
description = "Runs WDIO-to-Playwright migration quality checks and orchestrates healing progress."
config_file = "agents/wdio-to-playwright-check.toml"
